name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      packageVersion:
        description: Package version override (for example, 1.9.2)
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # enable GitHub OIDC token issuance for this job
      contents: write # enable creating GitHub Releases on tag push
    env:
      HF_FEED_URL: ${{ secrets.HF_FEED_URL }}
      HF_USER: ${{ secrets.HF_USER }}
      HF_PASS: ${{ secrets.HF_PASS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.packageVersion }}"

          if ([string]::IsNullOrWhiteSpace($version) -and "${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          }

          if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Package version could not be determined. Provide workflow_dispatch input 'packageVersion' or publish from a v* tag."
          }

          "package_version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore public projects
        run: |
          projects=(
            "src/FaceIT.Hangfire.Tags/FaceIT.Hangfire.Tags.csproj"
            "src/FaceIT.Hangfire.Tags.Mongo/FaceIT.Hangfire.Tags.Mongo.csproj"
            "src/FaceIT.Hangfire.Tags.MySql/FaceIT.Hangfire.Tags.MySql.csproj"
            "src/FaceIT.Hangfire.Tags.PostgreSql/FaceIT.Hangfire.Tags.PostgreSql.csproj"
            "src/FaceIT.Hangfire.Tags.Redis.StackExchange/FaceIT.Hangfire.Tags.Redis.StackExchange.csproj"
            "src/FaceIT.Hangfire.Tags.SQLite/FaceIT.Hangfire.Tags.SQLite.csproj"
            "src/FaceIT.Hangfire.Tags.SqlServer/FaceIT.Hangfire.Tags.SqlServer.csproj"
            "tests/FaceIT.Hangfire.Tags.Tests/FaceIT.Hangfire.Tags.Tests.csproj"
            "tests/FaceIT.Hangfire.Tags.PostgreSql.Tests/FaceIT.Hangfire.Tags.PostgreSql.Tests.csproj"
            "tests/FaceIT.Hangfire.Tags.MySql.Tests/FaceIT.Hangfire.Tags.MySql.Tests.csproj"
          )

          for project in "${projects[@]}"; do
            dotnet restore "$project"
          done

      - name: Build public projects
        run: |
          projects=(
            "src/FaceIT.Hangfire.Tags/FaceIT.Hangfire.Tags.csproj"
            "src/FaceIT.Hangfire.Tags.Mongo/FaceIT.Hangfire.Tags.Mongo.csproj"
            "src/FaceIT.Hangfire.Tags.MySql/FaceIT.Hangfire.Tags.MySql.csproj"
            "src/FaceIT.Hangfire.Tags.PostgreSql/FaceIT.Hangfire.Tags.PostgreSql.csproj"
            "src/FaceIT.Hangfire.Tags.Redis.StackExchange/FaceIT.Hangfire.Tags.Redis.StackExchange.csproj"
            "src/FaceIT.Hangfire.Tags.SQLite/FaceIT.Hangfire.Tags.SQLite.csproj"
            "src/FaceIT.Hangfire.Tags.SqlServer/FaceIT.Hangfire.Tags.SqlServer.csproj"
            "tests/FaceIT.Hangfire.Tags.Tests/FaceIT.Hangfire.Tags.Tests.csproj"
            "tests/FaceIT.Hangfire.Tags.PostgreSql.Tests/FaceIT.Hangfire.Tags.PostgreSql.Tests.csproj"
            "tests/FaceIT.Hangfire.Tags.MySql.Tests/FaceIT.Hangfire.Tags.MySql.Tests.csproj"
          )

          for project in "${projects[@]}"; do
            dotnet build "$project" -c Release --no-restore /p:ContinuousIntegrationBuild=true /p:Version=${{ steps.version.outputs.package_version }}
          done

      - name: Test
        run: |
          dotnet test tests/FaceIT.Hangfire.Tags.Tests/FaceIT.Hangfire.Tags.Tests.csproj -c Release --no-build --no-restore
          dotnet test tests/FaceIT.Hangfire.Tags.PostgreSql.Tests/FaceIT.Hangfire.Tags.PostgreSql.Tests.csproj -c Release --no-build --no-restore
          dotnet test tests/FaceIT.Hangfire.Tags.MySql.Tests/FaceIT.Hangfire.Tags.MySql.Tests.csproj -c Release --no-build --no-restore

      - name: Pack public packages
        run: |
          projects=(
            "src/FaceIT.Hangfire.Tags/FaceIT.Hangfire.Tags.csproj"
            "src/FaceIT.Hangfire.Tags.Mongo/FaceIT.Hangfire.Tags.Mongo.csproj"
            "src/FaceIT.Hangfire.Tags.MySql/FaceIT.Hangfire.Tags.MySql.csproj"
            "src/FaceIT.Hangfire.Tags.PostgreSql/FaceIT.Hangfire.Tags.PostgreSql.csproj"
            "src/FaceIT.Hangfire.Tags.Redis.StackExchange/FaceIT.Hangfire.Tags.Redis.StackExchange.csproj"
            "src/FaceIT.Hangfire.Tags.SQLite/FaceIT.Hangfire.Tags.SQLite.csproj"
            "src/FaceIT.Hangfire.Tags.SqlServer/FaceIT.Hangfire.Tags.SqlServer.csproj"
          )

          for project in "${projects[@]}"; do
            dotnet pack "$project" -c Release -o artifacts --no-build /p:ContinuousIntegrationBuild=true /p:Version=${{ steps.version.outputs.package_version }}
          done

      - name: Configure Hangfire Pro feed
        if: ${{ env.HF_FEED_URL != '' && env.HF_USER != '' && env.HF_PASS != '' }}
        run: dotnet nuget add source "$HF_FEED_URL" --name ExtHf --username "$HF_USER" --password "$HF_PASS" --store-password-in-clear-text

      - name: Pack Pro.Redis package
        if: ${{ env.HF_FEED_URL != '' && env.HF_USER != '' && env.HF_PASS != '' }}
        run: dotnet pack src/FaceIT.Hangfire.Tags.Pro.Redis/FaceIT.Hangfire.Tags.Pro.Redis.csproj -c Release -o artifacts /p:ContinuousIntegrationBuild=true /p:Version=${{ steps.version.outputs.package_version }}

      - name: NuGet Sign-in (OIDC to Temp API Key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: hangtools

      - name: Publish packages
        run: |
          shopt -s nullglob
          for pkg in artifacts/*.nupkg; do
            if [[ "$pkg" == *.snupkg ]]; then
              continue
            fi
            dotnet nuget push "$pkg" \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done

      - name: Publish symbol packages
        run: |
          shopt -s nullglob
          for spkg in artifacts/*.snupkg; do
            dotnet nuget push "$spkg" \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.nupkg
            artifacts/*.snupkg

